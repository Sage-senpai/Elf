<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <!-- COMMIT SHOWCASE — elf reading a stack of commits -->
  <!-- Pairs nicely with the CommitShowcase section -->

  <defs>
    <linearGradient id="cBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F1EFE8"/>
      <stop offset="1" stop-color="#E8E4D8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="500" fill="url(#cBg)"/>

  <!-- Subtle grid -->
  <g opacity="0.4">
    <pattern id="cGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(15,61,43,0.05)" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="500" fill="url(#cGrid)"/>
  </g>

  <!-- ────────────────── ELF (left side, looking right) ────────────────── -->
  <g transform="translate(180, 130)">
    <!-- Hat -->
    <ellipse cx="100" cy="62" rx="48" ry="10" fill="#0A2D1F"/>
    <ellipse cx="100" cy="60" rx="48" ry="9" fill="#0F3D2B"/>
    <path d="M 60 60 Q 76 8 100 6 Q 124 8 140 60 Z" fill="#0F3D2B"/>
    <path d="M 64 50 Q 100 56 136 50 L 138 60 Q 100 66 62 60 Z" fill="#0F6E56"/>
    <rect x="92" y="50" width="16" height="10" rx="1.5" fill="#9FE1CB" stroke="#0A2D1F" stroke-width="0.8"/>
    <circle cx="100" cy="6" r="6" fill="#9FE1CB"/>

    <!-- Ears -->
    <path d="M 60 100 L 38 80 Q 32 92 42 110 Z" fill="#F1EFE8"/>
    <path d="M 140 100 L 162 80 Q 168 92 158 110 Z" fill="#F1EFE8"/>

    <!-- Head -->
    <ellipse cx="100" cy="105" rx="42" ry="44" fill="#F1EFE8"/>

    <!-- Cheeks -->
    <ellipse cx="72" cy="118" rx="9" ry="6" fill="#E8AA94" opacity="0.55"/>
    <ellipse cx="128" cy="118" rx="9" ry="6" fill="#E8AA94" opacity="0.55"/>

    <!-- Eyebrows raised in interest -->
    <path d="M 72 88 Q 80 85 88 90" stroke="#2C2C2A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 112 90 Q 120 85 128 88" stroke="#2C2C2A" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Eyes — looking right at the commits -->
    <ellipse cx="80" cy="105" rx="7" ry="9" fill="#FFFFFF"/>
    <ellipse cx="80" cy="106" rx="5.5" ry="7" fill="#0F6E56"/>
    <circle cx="84" cy="106" r="3" fill="#0F3D2B"/>
    <circle cx="85.5" cy="104" r="1.4" fill="#FFFFFF"/>

    <ellipse cx="120" cy="105" rx="7" ry="9" fill="#FFFFFF"/>
    <ellipse cx="120" cy="106" rx="5.5" ry="7" fill="#0F6E56"/>
    <circle cx="124" cy="106" r="3" fill="#0F3D2B"/>
    <circle cx="125.5" cy="104" r="1.4" fill="#FFFFFF"/>

    <!-- Nose + small focused mouth -->
    <ellipse cx="100" cy="120" rx="3.5" ry="2.5" fill="#E8AA94"/>
    <path d="M 92 134 Q 100 132 108 134" fill="none" stroke="#2C2C2A" stroke-width="2" stroke-linecap="round"/>

    <!-- Scarf -->
    <path d="M 60 148 Q 100 156 140 148 L 142 162 Q 100 168 58 162 Z" fill="#9FE1CB"/>
    <path d="M 78 156 L 70 178 L 86 168 Z" fill="#9FE1CB"/>

    <!-- Body -->
    <path d="M 70 158 Q 100 168 130 158 L 138 220 Q 100 230 62 220 Z" fill="#0F6E56"/>
    <circle cx="100" cy="180" r="2" fill="#9FE1CB"/>
    <circle cx="100" cy="195" r="2" fill="#9FE1CB"/>

    <!-- Both arms holding a commit log scroll -->
    <path d="M 70 170 Q 80 200 120 200" stroke="#0F6E56" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M 130 170 Q 130 200 170 200" stroke="#0F6E56" stroke-width="11" fill="none" stroke-linecap="round"/>

    <!-- Hands holding tablet/scroll -->
    <circle cx="80" cy="200" r="6" fill="#F1EFE8"/>
    <circle cx="170" cy="200" r="6" fill="#F1EFE8"/>

    <!-- Mini tablet showing scrolling commits -->
    <rect x="76" y="190" width="98" height="40" rx="3" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.6"/>
    <rect x="80" y="194" width="20" height="4" rx="1" fill="#1D9E75"/>
    <rect x="80" y="202" width="60" height="2" rx="0.5" fill="#D3D1C7"/>
    <rect x="80" y="208" width="22" height="4" rx="1" fill="#C94070"/>
    <rect x="80" y="216" width="55" height="2" rx="0.5" fill="#D3D1C7"/>
    <rect x="80" y="222" width="18" height="4" rx="1" fill="#BA7517"/>
  </g>

  <!-- ────────────────── COMMIT STACK (right side) ────────────────── -->
  <g transform="translate(530, 60)">

    <!-- Commit 1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="540" height="80" rx="8" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
      <rect x="0" y="0" width="3" height="80" rx="0" fill="#1D9E75"/>
      <rect x="20" y="14" width="42" height="18" rx="4" fill="#E1F5EE"/>
      <text x="41" y="27" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#085041" font-weight="500">FEAT</text>
      <text x="74" y="27" font-family="JetBrains Mono, monospace" font-size="10" fill="#5F5E5A">auth/github</text>
      <text x="20" y="50" font-family="Inter, sans-serif" font-size="13" fill="#2C2C2A">GitHub OAuth sign-in lands.</text>
      <text x="20" y="68" font-family="Inter, sans-serif" font-size="11" fill="#5F5E5A">First-time users now get a one-click path from landing to workspace.</text>

      <!-- Avatar -->
      <circle cx="500" cy="40" r="14" fill="#0F6E56"/>
      <text x="500" y="44" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#9FE1CB" font-weight="500">YD</text>
    </g>

    <!-- Commit 2 -->
    <g transform="translate(0, 100)">
      <rect x="0" y="0" width="540" height="80" rx="8" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
      <rect x="0" y="0" width="3" height="80" rx="0" fill="#C94070"/>
      <rect x="20" y="14" width="60" height="18" rx="4" fill="#FBEAF0"/>
      <text x="50" y="27" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#72243E" font-weight="500">CONTENT</text>
      <text x="92" y="27" font-family="JetBrains Mono, monospace" font-size="10" fill="#5F5E5A">docs/onboarding</text>
      <text x="20" y="50" font-family="Inter, sans-serif" font-size="13" fill="#2C2C2A">Onboarding guide, draft 2.</text>
      <text x="20" y="68" font-family="Inter, sans-serif" font-size="11" fill="#5F5E5A">Plain-English walkthrough — no git terminology.</text>

      <circle cx="500" cy="40" r="14" fill="#C94070"/>
      <text x="500" y="44" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#FFFFFF" font-weight="500">MC</text>
    </g>

    <!-- Commit 3 -->
    <g transform="translate(0, 200)">
      <rect x="0" y="0" width="540" height="80" rx="8" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
      <rect x="0" y="0" width="3" height="80" rx="0" fill="#BA7517"/>
      <rect x="20" y="14" width="48" height="18" rx="4" fill="#FAEEDA"/>
      <text x="44" y="27" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#633806" font-weight="500">AUDIT</text>
      <text x="80" y="27" font-family="JetBrains Mono, monospace" font-size="10" fill="#5F5E5A">db/schema</text>
      <text x="20" y="50" font-family="Inter, sans-serif" font-size="13" fill="#2C2C2A">Schema review for the v2 on-chain tables.</text>
      <text x="20" y="68" font-family="Inter, sans-serif" font-size="11" fill="#5F5E5A">Verified treasury FK chains, payment status enum coverage.</text>

      <circle cx="500" cy="40" r="14" fill="#0F6E56"/>
      <text x="500" y="44" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#9FE1CB" font-weight="500">YD</text>
    </g>

    <!-- Commit 4 (peeking out, partial) -->
    <g transform="translate(0, 300)" opacity="0.5">
      <rect x="0" y="0" width="540" height="40" rx="8" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="0.5"/>
      <rect x="0" y="0" width="3" height="40" rx="0" fill="#534AB7"/>
      <rect x="20" y="14" width="34" height="18" rx="4" fill="#EEEDFE"/>
      <text x="37" y="27" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#3C3489" font-weight="500">REF</text>
      <text x="64" y="27" font-family="JetBrains Mono, monospace" font-size="10" fill="#5F5E5A">marketing/deck</text>
    </g>
  </g>

  <!-- Connecting "reading" line from elf eyes to first commit -->
  <path d="M 320 235 Q 420 240 525 100" stroke="#1D9E75" stroke-width="1" stroke-dasharray="3 4" opacity="0.3" fill="none"/>
</svg>
